runConfig:
  minInstances: 0

env:
  # Public Firebase config (safe to commit)
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyCga-8ZVe_1-X1t8V5L0LxqAFkr1t_lHEg"
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "packmetrics-77450.firebaseapp.com"
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "packmetrics-77450"
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "packmetrics-77450.firebasestorage.app"
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "678625187977"
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:678625187977:web:9c05af52521bd47322ce58"
  - variable: NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN
    value: "phc_mFfUXQMim7L3RkSkxyDmmtdsHKs98c5dGYLmmRXLEuic"
  - variable: NEXT_PUBLIC_POSTHOG_HOST
    value: "https://us.i.posthog.com"

  # Custom domain routing — the main packmetrix URL (used as fallback target)
  - variable: NEXT_PUBLIC_APP_URL
    value: "https://packmetrix.com"
  - variable: NEXT_PUBLIC_AGENCY_URL
    value: "https://agency.packmetrix.com"

  # Secrets
  - variable: OPENAI_API_KEY
    secret: OPENAI_API_KEY
  - variable: FIREBASE_ADMIN_KEY
    secret: FIREBASE_ADMIN_KEY
  - variable: ADMIN_EMAILS
    secret: ADMIN_EMAILS

  # Stripe — secrets (sensitive values stored in Secret Manager)
  - variable: STRIPE_SECRET_KEY
    secret: STRIPE_SECRET_KEY
  - variable: STRIPE_WEBHOOK_SECRET
    secret: STRIPE_WEBHOOK_SECRET
  - variable: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
    secret: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY

  # Stripe — price IDs (non-sensitive, safe to commit)
  - variable: STRIPE_PRICE_ID_FOUNDING_MONTHLY
    value: "price_1TYYes1w5lYoLZrLAZ5rGHxp"
  - variable: STRIPE_PRICE_ID_FOUNDING_ANNUAL
    value: "price_1TYYgP1w5lYoLZrLXPvrbK0G"
  - variable: STRIPE_PRICE_ID_STANDARD_MONTHLY
    value: "price_1TYYiF1w5lYoLZrL1UcT3WFK"
  - variable: STRIPE_PRICE_ID_STANDARD_ANNUAL
    value: "price_1TYYiX1w5lYoLZrLEckLjEz5"

  # Stripe — redirect URLs
  - variable: STRIPE_SUCCESS_URL
    value: "https://packmetrix.com/dashboard"
  - variable: STRIPE_CANCEL_URL
    value: "https://packmetrix.com/paywall"

  # Cloudflare for SaaS — custom domain provisioning
  - variable: CLOUDFLARE_ZONE_ID
    value: "cf89d388191248b28e431ebe934c0ee1"
  - variable: CLOUDFLARE_CUSTOM_HOSTNAME_TARGET
    value: "cname.packmetrix.com"
  - variable: CLOUDFLARE_FALLBACK_ORIGIN
    value: "proxy.packmetrix.com"
  - variable: CLOUDFLARE_API_TOKEN
    secret: CLOUDFLARE_API_TOKEN

  # Cron authentication — Cloud Scheduler sends this as X-Cron-Secret
  - variable: CRON_SECRET
    secret: CRON_SECRET

  # Resend — transactional emails
  - variable: RESEND_API_KEY
    secret: RESEND_API_KEY
